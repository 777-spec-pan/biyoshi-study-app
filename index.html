<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#9b416d">
  <title>美容師国家試験 MASTER</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">美容師国家試験対策</p>
      <h1 id="appTitle">美容師国家試験 MASTER</h1>
    </div>
    <span id="versionBadge" class="version">V1.0</span>
  </header>

  <main class="container">
    <section id="homeScreen">
      <div class="hero-card">
        <p>毎日少しずつ、合格へ。</p>
        <div class="stats-grid">
          <div><strong id="totalAnswered">0</strong><span>回答数</span></div>
          <div><strong id="accuracy">0%</strong><span>正答率</span></div>
          <div><strong id="wrongCount">0</strong><span>復習問題</span></div>
        </div>
      </div>

      <h2>学習メニュー</h2>
      <div class="menu-grid">
        <button class="menu-card" onclick="startQuiz('random')">
          <span class="menu-icon">✂️</span>
          <strong>ランダム10問</strong>
          <small>全分野から出題</small>
        </button>
        <button class="menu-card" onclick="showCategories()">
          <span class="menu-icon">📚</span>
          <strong>分野別学習</strong>
          <small>苦手分野を集中</small>
        </button>
        <button class="menu-card" onclick="startQuiz('wrong')">
          <span class="menu-icon">🔁</span>
          <strong>間違い復習</strong>
          <small>間違えた問題のみ</small>
        </button>
        <button class="menu-card" onclick="startMockExam()">
          <span class="menu-icon">📝</span>
          <strong>模擬試験</strong>
          <small>V1は10問体験版</small>
        </button>
      </div>

      <section class="notice">
        <strong>V1について</strong>
        <p>現在は動作確認用のオリジナル問題を収録しています。公式過去問の利用条件を確認後、問題数を増やします。</p>
      </section>
    </section>

    <section id="categoryScreen" class="hidden">
      <div class="screen-heading">
        <button class="back-btn" onclick="goHome()">← 戻る</button>
        <h2>分野を選ぶ</h2>
      </div>
      <div id="categoryList" class="category-list"></div>
    </section>

    <section id="quizScreen" class="hidden">
      <div class="quiz-top">
        <button class="back-btn" onclick="quitQuiz()">← 終了</button>
        <span id="progressText"></span>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
      <article class="question-card">
        <span id="categoryBadge" class="category-badge"></span>
        <h2 id="questionText"></h2>
        <div id="choices" class="choices"></div>
        <div id="resultBox" class="result-box hidden"></div>
        <button id="nextButton" class="primary-btn hidden" onclick="nextQuestion()">次の問題</button>
      </article>
    </section>

    <section id="resultScreen" class="hidden">
      <article class="result-card">
        <p class="eyebrow">学習結果</p>
        <h2 id="resultTitle">おつかれさまでした</h2>
        <div class="score-circle"><strong id="scoreText"></strong></div>
        <p id="resultMessage"></p>
        <button class="primary-btn" onclick="goHome()">ホームへ戻る</button>
      </article>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
